<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduzindo aúdios</title>
</head>
<body>
    <h1>Reproduzindo aúdios</h1>
    <p>Vamos aprender a como inserir aúdios no HTML5</p>
    <audio src="midia/Tanjiro (Kimetsu no Yaiba) - ＂A Luz Resplandece＂ ｜ Henrique Mendonça.mp3" controls autoplay></audio>
    <p>Ou pode ser assim também(melhor jeito)</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Tanjiro (Kimetsu no Yaiba) - ＂A Luz Resplandece＂ ｜ Henrique Mendonça.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
