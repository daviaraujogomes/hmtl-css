<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /* Box-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border: 5px, solid, darkgrey;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed purple;
        }
        a { /* Inline-level */
            border: 3px, solid, blue;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixa inline-level</a>. Vamos ver como tudo isso funciona.</p>

</body>
</html>
