<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir   qual tag deverá utilizar em cada caso.</p>

    <ul>
        <li><abbr title="Use a tag &lt;p>">Parágrafos</abbr></li>
        <li>
            <abbr title="Use a tag H1, H2, H3. Sucessivamente até o H6">Títulos</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;img> ">Imagem</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;abbr>">Abreviações</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;code>">Código-Fonte</abbr>
        </li>
    

    </ul>
</body>
</html>
